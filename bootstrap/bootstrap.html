<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  </head>
  <body class="bg-primary">
    <div class="container text-center">
    <h1 class="text-success">welcome</h1>
    <button class="btn btn-outline-success">join now</button><br>
    <button type="button" class="btn btn-link">Link</button><br>
    <button type="button" class="btn btn-close"></button>
    </div>
    <div class="card w-25 mt-5 mx-auto">
      <div class="card-body">
        <h5 class="card-title fw-bold">Card Title</h5>
        <p class="card-text lead">Some quick example text to build on the card title and make up the bulk of the card's content.</p>
        <a href="#" class="btn btn-primary">Go somewhere</a>
      </div>
    </div>
    <div class="alert alert-danger alert-dismissible fade show mt-3">
      <strong>Data Warning!</strong> You should check in on this
      <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>

    </div>
    <div class="container">
      <div class="row">
        <div class="col-6 bg-primary">text</div>

        <div class="col-7 bg-secondary">text
          <div class="col-3 bg-danger">text</div>
        </div>
      </div>
    </div>
    <form>
      <label class="form-label" text-success>username</label>
      <input class="form-control" type="text" placeholder="enter name"/>
      <label class="form-label" text-success>password</label>
      <input class="form-control" type="password" placeholder="enter password"/>
    </form>
    

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

  </body>
</html>
