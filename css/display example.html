    <title>display</title>

        <div class = "box inline-block"><img src="https://img.freepik.com/free-vector/cute-bee-with-honey-jar_1308-177925.jpg?semt=ais_rp_progressive&w=740&q=80" alt="bee" height="100%" width="100%"></div>
        <div class = "box inline-block"><img src="https://img.freepik.com/free-vector/cute-bee-with-honey-jar_1308-177925.jpg?semt=ais_rp_progressive&w=740&q=80" alt="bee" height="100%" width="100%"></div>

</html>
