<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>css background properties</title>
    <style>
        body{
            background-color: aquamarine;
            background-image: url("https://wallpapercave.com/wp/wp14601026.jpg");
            background-size:cover;
            background-repeat:no-repeat;
            color:azure;
            background-attachment:fixed;
            background: radial-gradient(white,black,blue,green);
            background: conic-gradient(white,black,blue,green);
            background-position: right center;

        }
        button{
            background-color: black;
            color:white
        }
        .container{
            background-color:rgba(0, 0, 0, 0.5);
            text-align: center;
            background: conic-gradient(white,black,blue,green);
            height=100vh;
            text-align: center;

            
        }
        h1{
            font-family: Arial;
            font: weight 50px;
            
            font-size: 50px;



        }
    </style>
</head>
<body>
    <div class="container">
    <center>
    <h1>welcome to prime video</h1>
    <p>join prime to watch the latest movies,tv shows</p>
    <button>sign in  to join prime</button>
    </center>
    </div>
    <section id="join-section">
        <div class="watch-section">
            <h2>watch movies</h2>
            <p>customers can subscribe to get access</p>
        </div>
        <div class="download-section">
            <h2>download and watch movies</h2>
            <p>customers can download movies and watch offline</p>
        </div>
    </section>
    
</body>
</html>
