<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid system</title>
    <style>
        .grid{
            background-color: rgb(74, 24, 24);
            height: 600px;
            width: 50%;
            display: grid;
            gap: 10px;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(5, 1fr);
        }
        .box{
            border: 1px dashed #dbdbdb;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }
        .box2{
            grid-column: 2/4;
            background-color: rgb(13, 74, 74);
        }
        .box3{
            grid-column: 4;
            grid-row: 1/3;
            background-color: rgb(148, 100, 84);
        }
        .box6{
            grid-column: 3;
            grid-row: 2/4;
            background-color: rgb(103, 68, 16);
        }
    </style>
</head>
<body>
    <div class="grid">
        <div class="box">1</div>
         <div class="box box2">2</div>
          <div class="box box3">3</div>
           <div class="box">4</div>
           <div class="box">5</div>
         <div class="box box6">6</div>
          <div class="box">7</div>
           <div class="box">8</div>
           <div class="box">9</div>
         <div class="box">10</div>
         <div class="box">11</div>
          <div class="box">12</div>
           <div class="box">13</div>
           <div class="box">14</div>
         <div class="box">15</div>
    </div>
</body>
</html>
