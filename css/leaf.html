<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfect Leaf</title>
    <style>
        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #87CEEB 0%, #E0F7FA 100%);
        }
        
        .leaf {
            position: relative;
            width: 200px;
            height: 300px;
            background: linear-gradient(135deg, #4CAF50 0%, #2E7D32 50%, #1B5E20 100%);
            border-radius: 5% 85% 10% 90%;
            box-shadow: 
                inset 10px 10px 30px rgba(255, 255, 255, 0.2),
                inset -10px -10px 30px rgba(0, 0, 0, 0.2),
                5px 10px 20px rgba(0, 0, 0, 0.3);
            transform: rotate(-15deg);
        }
        
        /* Main vein (center line) */
        .leaf::before {
            content: '';
            position: absolute;
            top: 10%;
            left: 50%;
            width: 4px;
            height: 80%;
            background: linear-gradient(to bottom, #1B5E20, #2E7D32);
            transform: translateX(-50%);
            border-radius: 2px;
        }
        
        /* Stem
        .leaf::after {
            content: '';
            position: absolute;
            bottom: -40px;
            left: 50%;
            width: 8px;
            height: 50px;
            background: linear-gradient(to bottom, #5D4037, #3E2723);
            transform: translateX(-50%);
            border-radius: 3px;
        }
        
        /* Side veins */
        .vein {
            position: absolute;
            background: linear-gradient(90deg, transparent, rgba(27, 94, 32, 0.6), transparent);
            height: 2px;
            transform-origin: left center;
        }
        
        .vein:nth-child(1) {
            top: 25%;
            left: 45%;
            width: 80px;
            transform: rotate(35deg);
        }
        
        .vein:nth-child(2) {
            top: 40%;
            left: 45%;
            width: 90px;
            transform: rotate(25deg);
        }
        
        .vein:nth-child(3) {
            top: 55%;
            left: 45%;
            width: 85px;
            transform: rotate(15deg);
        }
        
        .vein:nth-child(4) {
            top: 70%;
            left: 45%;
            width: 70px;
            transform: rotate(5deg);
        }
        
        .vein:nth-child(5) {
            top: 25%;
            right: 45%;
            width: 80px;
            transform: rotate(-35deg);
        }
        
        .vein:nth-child(6) {
            top: 40%;
            right: 45%;
            width: 90px;
            transform: rotate(-25deg);
        }
        
        .vein:nth-child(7) {
            top: 55%;
            right: 45%;
            width: 85px;
            transform: rotate(-15deg);
        }
        
        .vein:nth-child(8) {
            top: 70%;
            right: 45%;
            width: 70px;
            transform: rotate(-5deg);
        }
    </style>
</head>
<body>
    <div class="leaf">
        <div class="vein"></div>
        <div class="vein"></div>
        <div class="vein"></div>
        <div class="vein"></div>
        <div class="vein"></div>
        <div class="vein"></div>
        <div class="vein"></div>
        <div class="vein"></div>
    </div> */
</body>
</html>
