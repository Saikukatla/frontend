<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLEXBOX</title>
    <style>
        body{
            margin:0;
            padding:0;
        }
        .container{
            background-color: lightgray;
            height:90vh;
            margin:5px;
            padding:5px;
            border:1px solid black;
            text-align: center;
            display: flex;
            gap:10px;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            align-content: center;
            flex-direction: column;

            
        }
        .box{
            height: 50px;
            width:80px;
            background-color: aquamarine;
            margin:10px;
        }
        .box4{
            align-self: flex-start;

        }
        box5{
            flex-grow: 1;
        }

    </style>
</head>
<body>
    <div class="container">
        <div class="box">1</div>
        <div class="box">2</div>
        <div class="box">3</div>
        <div class="box box4">4</div>
        <div class="box box5">5</div>
        <!-- <div class="box">6</div>
        <div class="box">7</div>
        <div class="box">8</div>
        <div class="box">9</div>
        <div class="box">10</div> -->


    </div>
    
</body>
</html>
